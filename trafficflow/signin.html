<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrafficIQ — Sign In / Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="signin.css"/>
</head>
<body>

<div class="bg-scene">
  <canvas id="roadCanvas"></canvas>
  <div class="gradient-overlay"></div>
  <div id="particles"></div>
</div>

<main class="auth-wrapper">

  <div class="logo-bar">
    <div class="logo-icon">🚦</div>
    <span class="logo-text">Trafficcc<span>IQ</span></span>
  </div>

  <div class="auth-card">

    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      <div class="tab-slider" id="tabSlider"></div>
    </div>

    <!-- SIGN IN -->
    <div class="form-panel" id="signinPanel">
      <p class="subtitle">Welcome back. The city's watching.</p>
      <form novalidate>

        <div class="field-group">
          <div class="input-wrap">
            <span class="ico">📧</span>
            <input type="text" id="si-id" class="field-input" placeholder=" "/>
            <label class="field-label" for="si-id">Email or Mobile Number</label>
          </div>
          <span class="err" id="err-si-id"></span>
        </div>

        <div class="field-group">
          <div class="input-wrap">
            <span class="ico">🔒</span>
            <input type="password" id="si-pwd" class="field-input" placeholder=" "/>
            <label class="field-label" for="si-pwd">Password</label>
            <button type="button" class="eye-btn" onclick="togglePwd('si-pwd',this)">👁</button>
          </div>
          <span class="err" id="err-si-pwd"></span>
        </div>

        <div class="row-between">
          <label class="check-label"><input type="checkbox"/><span class="check-box"></span>Remember me</label>
          <a href="#" class="link">Forgot password?</a>
        </div>

        <button type="button" class="submit-btn" onclick="handleSignIn()">
          <span class="btn-text">Sign In</span><span class="btn-spin" hidden></span>
        </button>

        <div class="divider"><span>or</span></div>
        <button type="button" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>

      </form>
    </div>

    <!-- SIGN UP -->
    <div class="form-panel hidden" id="signupPanel">
      <p class="subtitle">Join the city's intelligence network.</p>
      <form novalidate>

        <div class="fields-grid">
          <div class="field-group">
            <div class="input-wrap">
              <span class="ico">👤</span>
              <input type="text" id="su-name" class="field-input" placeholder=" "/>
              <label class="field-label" for="su-name">Full Name</label>
            </div>
            <span class="err" id="err-su-name"></span>
          </div>

          <div class="field-group">
            <div class="input-wrap">
              <span class="ico">📧</span>
              <input type="email" id="su-email" class="field-input" placeholder=" "/>
              <label class="field-label" for="su-email">Email Address</label>
            </div>
            <span class="err" id="err-su-email"></span>
          </div>

          <div class="field-group">
            <div class="input-wrap">
              <span class="ico">📱</span>
              <input type="tel" id="su-mobile" class="field-input" placeholder=" " maxlength="10"/>
              <label class="field-label" for="su-mobile">Mobile Number</label>
            </div>
            <span class="err" id="err-su-mobile"></span>
          </div>

          <div class="field-group">
            <div class="input-wrap">
              <span class="ico">🚘</span>
              <input type="text" id="su-plate" class="field-input plate-input" placeholder=" "/>
              <label class="field-label" for="su-plate">Vehicle Plate No.</label>
            </div>
            <span class="err" id="err-su-plate"></span>
          </div>

          <div class="field-group">
            <div class="input-wrap">
              <span class="ico">🔒</span>
              <input type="password" id="su-pwd" class="field-input" placeholder=" " oninput="checkStrength(this.value)"/>
              <label class="field-label" for="su-pwd">Password</label>
              <button type="button" class="eye-btn" onclick="togglePwd('su-pwd',this)">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="sFill"></div></div>
            <span class="strength-lbl" id="sLbl"></span>
            <span class="err" id="err-su-pwd"></span>
          </div>

          <div class="field-group">
            <div class="input-wrap">
              <span class="ico">🔐</span>
              <input type="password" id="su-confirm" class="field-input" placeholder=" "/>
              <label class="field-label" for="su-confirm">Confirm Password</label>
              <button type="button" class="eye-btn" onclick="togglePwd('su-confirm',this)">👁</button>
            </div>
            <span class="err" id="err-su-confirm"></span>
          </div>
        </div>

        <label class="check-label terms-check">
          <input type="checkbox" id="agreeTerms"/>
          <span class="check-box"></span>
          I agree to <a href="#" class="link">Terms &amp; Privacy</a>
        </label>
        <span class="err" id="err-terms"></span>

        <button type="button" class="submit-btn" onclick="handleSignUp()">
          <span class="btn-text">Create Account</span><span class="btn-spin" hidden></span>
        </button>

        <div class="divider"><span>or</span></div>
        <button type="button" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>

      </form>
    </div>

  </div>
  <p class="footer-note">© 2025 TrafficIQ · Smarter Cities · India</p>
</main>

<script src="signin.js"></script>
</body>
</html>

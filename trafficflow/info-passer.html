<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TrafficIQ — Info Passer</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="info-passer.css"/>
</head>
<body>

<canvas id="bg"></canvas>

<!-- TOP BAR -->
<header id="topbar">
  <div class="tb-l">
    <a href="dashboard.html" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>Back
    </a>
    <div class="tb-brand">
      <span class="live-badge"><span class="ldot"></span>LIVE</span>
      <h1>📡 Info Passer · <em id="cityLabel">…</em></h1>
    </div>
  </div>
  <div class="tb-r">
    <div class="tb-stat"><strong id="tbAlerts">0</strong><span>alerts</span></div>
    <div class="tb-stat"><strong id="tbUsers">0</strong><span>reporters</span></div>
    <button id="panTog" class="icon-btn" title="Panel">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
    </button>
    <button id="themeBtn" class="icon-btn">🌙</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT PANEL 25% — ranked issues -->
  <aside id="panel">
    <div class="panel-inner">
      <p class="panel-title">🔴 AUTO-RANKED ALERTS</p>
      <p class="panel-sub">Sorted by repetition · Updates live</p>
      <div id="rankList"></div>
    </div>
  </aside>

  <!-- RIGHT 75% — alert feed -->
  <main class="stream">

    <button id="scrollBtn" class="scroll-btn" onclick="scrollToBottom()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      New alerts ↓
    </button>

    <div class="feed" id="feed"></div>

    <!-- DOCK -->
    <div class="dock">
      <div class="triggers">
        <button class="trig trig-red"   data-type="accident"     data-msg="🚨 Accident at signal — avoid immediately!"        onclick="trigFill(this)">🚨 Accident at Signal</button>
        <button class="trig trig-amber" data-type="blocked"      data-msg="🚧 Road blocked — major diversion in effect."      onclick="trigFill(this)">🚧 Road Blocked</button>
        <button class="trig trig-amber" data-type="diversion"    data-msg="🔀 Heavy diversion ahead — expect long delays."    onclick="trigFill(this)">🔀 Heavy Diversion</button>
        <button class="trig trig-yel"   data-type="slow"         data-msg="🐢 Slow movement — traffic crawling this stretch." onclick="trigFill(this)">🐢 Slow Movement</button>
        <button class="trig trig-red"   data-type="breakdown"    data-msg="🚛 Vehicle breakdown blocking lanes."              onclick="trigFill(this)">🚛 Breakdown</button>
        <button class="trig trig-yel"   data-type="construction" data-msg="🔧 Construction work — reduced lanes ahead."       onclick="trigFill(this)">🔧 Construction</button>
      </div>
      <div class="input-row">
        <div class="chat-wrap">
          <input id="chatInp" type="text" placeholder="Pass information to fellow drivers…" autocomplete="off"/>
          <button class="send-btn" onclick="sendMsg()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="qnav">
          <a href="shortcuts.html"      class="qi" data-tip="Shortcuts"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></a>
          <a href="time-taken.html"     class="qi" data-tip="Time Taken"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></a>
          <a href="enter-traffics.html" class="qi" data-tip="Enter Traffic"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></a>
          <a href="entertainment.html"  class="qi" data-tip="Entertainment"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></a>
          <a href="trusted-users.html"  class="qi" data-tip="Trusted Users"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></a>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="mobOverlay" onclick="togglePanel()"></div>
<div id="av-tip"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    doc,
    setDoc,
    updateDoc,
    increment,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAKGbbt_ARGWep8ggPuk_iE6R1xALkmJM8",
    authDomain: "trafficiq-3ef14.firebaseapp.com",
    projectId: "trafficiq-3ef14",
    storageBucket: "trafficiq-3ef14.firebasestorage.app",
    messagingSenderId: "97313655693",
    appId: "1:97313655693:web:fee4304d7815bdceaf0bc4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // expose globally for info-passer.js
  window.db = db;
  window.fb = {
    collection,
    doc,
    setDoc,
    updateDoc,
    increment,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp
  };

  // load main script AFTER firebase ready
  const s = document.createElement('script');
  s.src = 'info-passer.js';
  document.body.appendChild(s);
</script>

</body>
</html>
